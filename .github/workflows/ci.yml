name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: check (make check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: make lint
        run: make lint

      - name: make vet
        run: make vet

      - name: make build
        run: make build

      - name: test with coverage
        run: go test -race ./... -coverprofile=cover.out -covermode=atomic -coverpkg=./...

      - name: coverage summary
        run: |
          pct=$(go tool cover -func=cover.out | awk '/^total:/{gsub(/%/,"",$3); print $3}')
          {
            echo "## Coverage: ${pct}%"
            echo "![coverage](https://img.shields.io/badge/coverage-${pct}%25-blue)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: make check-demo
        run: make check-demo

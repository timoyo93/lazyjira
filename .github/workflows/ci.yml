name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: check (make check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: make lint
        run: make lint

      - name: make vet
        run: make vet

      - name: make build
        run: make build

      - name: make test
        run: make test

      - name: make check-demo
        run: make check-demo
